name: Weekly KTC snapshot

on:
  schedule:
    # Monday 13:17 UTC (~9:17am ET) — off-the-hour to be polite to shared GHA runners.
    # Well after KTC's overnight value updates.
    - cron: "17 13 * * 1"
  workflow_dispatch: {}   # allow manual trigger for testing

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Capture KTC snapshot
        run: node bin/update.mjs ktc

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add ktc/ manifest.json
            git commit -m "ktc: snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
